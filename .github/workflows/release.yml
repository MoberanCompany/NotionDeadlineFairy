name: Build and Release WPF App

on:
  push:
    branches:
      - release
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish (win-x64, single-file, self-contained)
        run: >
          dotnet publish NotionDeadlineFairy.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/win-x64

      - name: Read version from published binary (Nerdbank.GitVersioning)
        shell: pwsh
        id: version
        run: |
          $exe = Get-ChildItem -Path "publish/win-x64" -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { throw "No executable found in publish/win-x64" }

          $productVersion = (Get-Item $exe.FullName).VersionInfo.ProductVersion
          if (-not $productVersion) { throw "ProductVersion not found on $($exe.Name)" }

          $semVer = $productVersion -replace '\+.*$',''
          $tag = "v$semVer"

          "exe_name=$($exe.Name)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "product_version=$productVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "semver=$semVer" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create ZIP package
        shell: pwsh
        run: |
          $zipName = "NotionDeadlineFairy-${{ steps.version.outputs.semver }}-win-x64.zip"
          Compress-Archive -Path "publish/win-x64/*" -DestinationPath $zipName -Force
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ steps.version.outputs.tag }}
          prerelease: ${{ contains(steps.version.outputs.semver, '-') }}
          files: ${{ steps.package.outputs.zip_name }}
          generate_release_notes: true

      - name: Upload artifact (manual run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.zip_name }}
          path: ${{ steps.package.outputs.zip_name }}
